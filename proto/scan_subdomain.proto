syntax = "proto3";

package scan_subdomain;
option go_package = "go-server/gen/scan_subdomain;scan_subdomain";

// service definition
service SubdomainScannerService {
  // ScanAndCheck returns domain information such as subdomain, status_code, title and so on
  // via ScanResponse
  rpc ScanAndCheck (ScanAndCheckRequest) returns (stream ScanAndCheckResponse);
  // CancelScan allows clients to cancel an ongoing scan by providing the scan_id and user_id. 
  // It returns a CancelScanResponse indicating whether the cancellation was successful.
  rpc CancelScan (CancelScanRequest) returns (CancelScanResponse);

  // ScanAndCheckTerminal performs the same scan as ScanAndCheck but streams
  // raw terminal-style output in real-time via ScanAndCheckTerminalResponse.
  // This gives clients a CLI-like experience while the tool is running.
  rpc ScanAndCheckTerminal (ScanAndCheckTerminalRequest) returns (stream ScanAndCheckTerminalResponse);
}

// message for request
message ScanAndCheckRequest {
  string domain = 1;
  string user_id = 2;
  string scan_id = 3;
}

message ScanAndCheckTerminalRequest {
  string domain = 1;
  string user_id = 2;
  string scan_id = 3;
}

// message for response
message ScanAndCheckResponse {
  string subdomain = 1;
  bool is_alive = 2;
  int32 status_code = 3;
  string title = 4;
  string ip = 5;
  // repeated = array/list because a subdomain is possible to have many technologies
  repeated string technologies = 6;
  string scan_id = 7;
}

message ScanAndCheckTerminalResponse {
  bytes data = 1;
}

message CancelScanRequest {
  string scan_id = 1;
  string user_id = 2;
}

message CancelScanResponse {
  string scan_id = 1;
  bool cancelled = 2;
  string message = 3;
}
